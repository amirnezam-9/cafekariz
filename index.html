<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه کاریز</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    direction: rtl;
    min-height: 100vh;
    overflow: hidden;
    background: #050a14;
  }

  /* ===== CANVAS PARTICLES ===== */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('/photo_2026-05-17_22-01-51.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0;
    filter: saturate(0.85);
    animation: bgFadeIn 2s ease 0.5s forwards;
  }
  @keyframes bgFadeIn {
    to { opacity: 0.55; }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(5,10,20,0.97) 0%, rgba(5,10,20,0.5) 55%, rgba(5,10,20,0.75) 100%);
    z-index: 1;
  }

  /* نئون پالس */
  .neon-glow-top {
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at center, rgba(30,120,255,0.22) 0%, transparent 70%);
    pointer-events: none;
    z-index: 2;
    animation: neonPulse 4s ease-in-out infinite;
  }
  .neon-glow-pink {
    position: absolute;
    bottom: -60px; right: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(ellipse at center, rgba(232,0,90,0.14) 0%, transparent 70%);
    pointer-events: none;
    z-index: 2;
    animation: neonPulse 4s ease-in-out 2s infinite;
  }
  @keyframes neonPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }
  .neon-glow-pink { animation: neonPulsePink 4s ease-in-out 2s infinite; }
  @keyframes neonPulsePink {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ===== CONTENT ===== */
  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    color: #fff;
    padding: 0 24px;
  }

  /* لوگو با انیمیشن ورود */
  .logo-icon {
    width: 280px;
    height: 170px;
    margin: 0 auto 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(-30px) scale(0.8);
    animation: logoIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }
  @keyframes logoIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 16px rgba(74,168,255,0.7)) drop-shadow(0 0 32px rgba(74,168,255,0.3));
    animation: logoGlow 3s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(74,168,255,0.7)) drop-shadow(0 0 32px rgba(74,168,255,0.3)); }
    50%       { filter: drop-shadow(0 0 24px rgba(74,168,255,1))   drop-shadow(0 0 48px rgba(74,168,255,0.6)); }
  }

  /* اسم کافه */
  .cafe-name {
    font-size: 54px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 0.9s forwards;
  }
  .cafe-name span {
    color: #4AA8FF;
    text-shadow: 0 0 20px rgba(74,168,255,0.9), 0 0 40px rgba(74,168,255,0.5);
    display: inline-block;
    animation: textFlicker 6s ease-in-out 2s infinite;
  }
  @keyframes textFlicker {
    0%,90%,100% { opacity: 1; }
    92% { opacity: 0.6; }
    94% { opacity: 1; }
    96% { opacity: 0.4; }
    98% { opacity: 1; }
  }

  .tagline {
    font-size: 15px;
    color: rgba(168,206,237,0.65);
    letter-spacing: 3px;
    font-weight: 300;
    margin-bottom: 52px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 1.1s forwards;
  }

  /* خط جداکننده با موشن */
  .divider {
    width: 0px;
    height: 1.5px;
    background: rgba(74,168,255,0.8);
    margin: 0 auto 44px;
    box-shadow: 0 0 10px rgba(74,168,255,1);
    animation: dividerExpand 0.8s ease 1.4s forwards;
  }
  @keyframes dividerExpand {
    to { width: 80px; }
  }

  /* دکمه‌ها */
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }
  .btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 28px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    letter-spacing: 0.3px;
    opacity: 0;
    transform: translateY(20px);
  }
  .btn:nth-child(1) { animation: fadeUp 0.7s ease 1.6s forwards; }
  .btn:nth-child(2) { animation: fadeUp 0.7s ease 1.8s forwards; }
  .btn:nth-child(3) { animation: fadeUp 0.7s ease 2.0s forwards; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .btn:hover { transform: translateY(-3px) !important; }
  .btn:active { transform: scale(0.97) !important; }

  .btn-primary {
    background: rgba(30,100,255,0.2);
    color: #7DC8FF;
    border: 1.5px solid rgba(74,168,255,0.55);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 16px rgba(30,120,255,0.2), inset 0 0 20px rgba(30,120,255,0.05);
  }
  .btn-primary:hover {
    background: rgba(30,100,255,0.32);
    box-shadow: 0 0 28px rgba(74,168,255,0.45), inset 0 0 20px rgba(74,168,255,0.08);
    border-color: rgba(74,168,255,0.85);
    color: #B8DEFF;
  }
  .btn-insta {
    background: rgba(10,20,50,0.5);
    color: #A8CEED;
    border: 1px solid rgba(74,168,255,0.25);
    backdrop-filter: blur(10px);
  }
  .btn-insta:hover {
    background: rgba(20,50,100,0.45);
    box-shadow: 0 0 20px rgba(74,168,255,0.2);
    border-color: rgba(74,168,255,0.5);
  }
  .btn-contact {
    background: rgba(232,0,90,0.08);
    color: #FF70A6;
    border: 1px solid rgba(232,0,90,0.3);
    backdrop-filter: blur(10px);
  }
  .btn-contact:hover {
    background: rgba(232,0,90,0.18);
    box-shadow: 0 0 20px rgba(232,0,90,0.25);
    border-color: rgba(232,0,90,0.55);
  }
  .btn svg {
    width: 20px; height: 20px; flex-shrink: 0;
    fill: none; stroke: currentColor;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }



  .footer-note {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    text-align: center;
    color: rgba(74,168,255,0.2);
    font-size: 12px;
    z-index: 3;
    letter-spacing: 1.5px;
    opacity: 0;
    animation: fadeUp 1s ease 2.4s forwards;
  }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div class="hero">
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="neon-glow-top"></div>
  <div class="neon-glow-pink"></div>

  <div class="content">
    <div class="logo-icon">
      <img src="/logo.png" alt="لوگو کافه کاریز">
    </div>
    <div class="tagline">در لحظه جاری باش!</div>
    <div class="divider"></div>
    <div class="buttons">
      <a href="https://karizcafe.menew.ir/catalogue" target="_blank" class="btn btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        مشاهده منو آنلاین
      </a>
      <a href="https://instagram.com/cafekariz.ir" target="_blank" class="btn btn-insta">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        اینستاگرام ما
      </a>
      <a href="tel:+989021062036" class="btn btn-contact">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.85 12 19.79 19.79 0 0 1 1.78 3.38 2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.09a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        تماس با ما
      </a>
    </div>
  </div>
  <div class="footer-note">© ۱۴۰۴ کافه کاریز · مشهد</div>
</div>

<script>
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const BLUE = { r:74, g:168, b:255 };
const PINK = { r:232, g:0, b:130 };

const particles = Array.from({ length: 80 }, () => createParticle());

function createParticle() {
  const isPink = Math.random() < 0.2;
  const c = isPink ? PINK : BLUE;
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.8 + 0.3,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4 - 0.2,
    alpha: Math.random() * 0.6 + 0.1,
    alphaDir: Math.random() > 0.5 ? 1 : -1,
    alphaSpeed: Math.random() * 0.008 + 0.002,
    c,
  };
}

function drawParticle(p) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${p.c.r},${p.c.g},${p.c.b},${p.alpha})`;
  ctx.shadowColor = `rgba(${p.c.r},${p.c.g},${p.c.b},0.8)`;
  ctx.shadowBlur = 8;
  ctx.fill();
}

function connectParticles() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.12;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(74,168,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.shadowBlur = 0;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.shadowBlur = 0;

  connectParticles();

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha += p.alphaDir * p.alphaSpeed;
    if (p.alpha > 0.7 || p.alpha < 0.05) p.alphaDir *= -1;

    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
    if (p.y < -10) p.y = canvas.height + 10;
    if (p.y > canvas.height + 10) p.y = -10;

    drawParticle(p);
  });

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
