<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه کاریز</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    direction: rtl;
    min-height: 100vh;
    overflow: hidden;
  }
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a0e05;
    overflow: hidden;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=1600&q=80');
    background-size: cover;
    background-position: center;
    opacity: 0.45;
    filter: saturate(0.8);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,5,2,0.85) 0%, rgba(10,5,2,0.3) 50%, rgba(10,5,2,0.5) 100%);
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff;
    padding: 0 24px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .logo-icon svg {
    width: 32px;
    height: 32px;
    fill: none;
    stroke: #d4a96a;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .cafe-name {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .cafe-name span { color: #d4a96a; }
  .tagline {
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 56px;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }
  .btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 28px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    border: none;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #d4a96a; color: #1a0e05; }
  .btn-primary:hover { box-shadow: 0 8px 32px rgba(212,169,106,0.35); }
  .btn-insta {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
  }
  .btn-insta:hover { background: rgba(255,255,255,0.16); box-shadow: 0 8px 32px rgba(255,255,255,0.08); }
  .btn-contact {
    background: rgba(212,169,106,0.1);
    color: #d4a96a;
    border: 1px solid rgba(212,169,106,0.3);
    backdrop-filter: blur(10px);
  }
  .btn-contact:hover { background: rgba(212,169,106,0.18); box-shadow: 0 8px 32px rgba(212,169,106,0.15); }
  .btn svg {
    width: 20px; height: 20px; flex-shrink: 0;
    fill: none; stroke: currentColor;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  .footer-note {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    z-index: 2;
    letter-spacing: 1px;
  }
  .divider {
    width: 40px; height: 1px;
    background: rgba(212,169,106,0.4);
    margin: 0 auto 40px;
  }
</style>
</head>
<body>
<div class="hero">
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/>
        <line x1="10" y1="1" x2="10" y2="4"/>
        <line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
    </div>
    <div class="cafe-name">کافه <span>کاریز</span></div>
    <div class="tagline">در لحظه جاری باشید</div>
    <div class="divider"></div>
    <div class="buttons">
      <a href="#" class="btn btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        مشاهده منو آنلاین
      </a>
      <a href="https://instagram.com" target="_blank" class="btn btn-insta">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        اینستاگرام ما
      </a>
      <a href="tel:+989123456789" class="btn btn-contact">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.85 12 19.79 19.79 0 0 1 1.78 3.38 2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.09a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        تماس با ما
      </a>
    </div>
  </div>
  <div class="footer-note">© ۱۴۰۴ کافه کاریز · تهران</div>
</div>
</body>
</html>
