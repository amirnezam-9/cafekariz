<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه کاریز</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    direction: rtl;
    min-height: 100vh;
    overflow: hidden;
  }
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050a14;
    overflow: hidden;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('/cafekariz/photo_2026-05-17_22-01-51.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0.55;
    filter: saturate(0.85);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(5,10,20,0.97) 0%, rgba(5,10,20,0.5) 55%, rgba(5,10,20,0.75) 100%);
  }
  /* نئون آبی گوشه بالا */
  .neon-glow-top {
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at center, rgba(30,120,255,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
  /* نئون صورتی گوشه */
  .neon-glow-pink {
    position: absolute;
    bottom: -60px; right: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(ellipse at center, rgba(232,0,90,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff;
    padding: 0 24px;
  }
  .logo-icon {
    width: 68px;
    height: 68px;
    margin: 0 auto 22px;
    background: rgba(30,120,255,0.08);
    border: 1.5px solid rgba(80,160,255,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 18px rgba(30,120,255,0.3), inset 0 0 12px rgba(30,120,255,0.08);
  }
  .logo-icon svg {
    width: 32px; height: 32px;
    fill: none;
    stroke: #4AA8FF;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px rgba(74,168,255,0.8));
  }
  .cafe-name {
    font-size: 54px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 10px;
    text-shadow: 0 0 40px rgba(30,120,255,0.4);
  }
  .cafe-name span {
    color: #4AA8FF;
    text-shadow: 0 0 20px rgba(74,168,255,0.9), 0 0 40px rgba(74,168,255,0.5);
  }
  .tagline {
    font-size: 15px;
    color: rgba(168,206,237,0.65);
    letter-spacing: 3px;
    font-weight: 300;
    margin-bottom: 52px;
  }
  .divider {
    width: 48px; height: 1.5px;
    background: rgba(74,168,255,0.6);
    margin: 0 auto 44px;
    box-shadow: 0 0 8px rgba(74,168,255,0.8);
  }
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }
  .btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 28px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: rgba(30,100,255,0.2);
    color: #7DC8FF;
    border: 1.5px solid rgba(74,168,255,0.55);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 16px rgba(30,120,255,0.2), inset 0 0 20px rgba(30,120,255,0.05);
  }
  .btn-primary:hover {
    background: rgba(30,100,255,0.32);
    box-shadow: 0 0 28px rgba(74,168,255,0.45), inset 0 0 20px rgba(74,168,255,0.08);
    border-color: rgba(74,168,255,0.85);
    color: #B8DEFF;
  }

  .btn-insta {
    background: rgba(10,20,50,0.5);
    color: #A8CEED;
    border: 1px solid rgba(74,168,255,0.25);
    backdrop-filter: blur(10px);
  }
  .btn-insta:hover {
    background: rgba(20,50,100,0.45);
    box-shadow: 0 0 20px rgba(74,168,255,0.2);
    border-color: rgba(74,168,255,0.5);
  }

  .btn-contact {
    background: rgba(232,0,90,0.08);
    color: #FF70A6;
    border: 1px solid rgba(232,0,90,0.3);
    backdrop-filter: blur(10px);
  }
  .btn-contact:hover {
    background: rgba(232,0,90,0.18);
    box-shadow: 0 0 20px rgba(232,0,90,0.25);
    border-color: rgba(232,0,90,0.55);
  }

  .btn svg {
    width: 20px; height: 20px; flex-shrink: 0;
    fill: none; stroke: currentColor;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  .footer-note {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    text-align: center;
    color: rgba(74,168,255,0.2);
    font-size: 12px;
    z-index: 2;
    letter-spacing: 1.5px;
  }
</style>
</head>
<body>
<div class="hero">
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="neon-glow-top"></div>
  <div class="neon-glow-pink"></div>

  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/>
        <line x1="10" y1="1" x2="10" y2="4"/>
        <line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
    </div>
    <div class="cafe-name">کافه <span>کاریز</span></div>
    <div class="tagline">در لحظه جاری باش!</div>
    <div class="divider"></div>
    <div class="buttons">
      <a href="https://karizcafe.menew.ir/catalogue" target="_blank" class="btn btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        مشاهده منو آنلاین
      </a>
      <a href="https://instagram.com/cafekariz.ir" target="_blank" class="btn btn-insta">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        اینستاگرام ما
      </a>
      <a href="tel:+989021062036" class="btn btn-contact">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.85 12 19.79 19.79 0 0 1 1.78 3.38 2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.09a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        تماس با ما
      </a>
    </div>
  </div>
  <div class="footer-note">© ۱۴۰۴ کافه کاریز · مشهد</div>
</div>
</body>
</html>
